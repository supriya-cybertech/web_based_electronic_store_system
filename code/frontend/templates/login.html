<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechMart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">🏪 TechMart</div>
        <div class="navbar-links">
            <a href="/">Home</a>
        </div>
    </nav>

    <div class="form-container">
        <h2 style="text-align: center; color:000000; margin-bottom: 1.5rem;">User Login</h2>
        
        <div id="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="userId">User ID</label>
                <input type="text" id="userId" name="userId" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem;">
            Don't have an account? <a href="/registration" style="color: var(--fade-green); font-weight: bold;">Register here</a>
        </p>
        
        <p style="text-align: center; margin-top: 1rem;">
            <a href="/admin_login" style="color: var(--light-blue); font-weight: bold;">Admin Login</a>
        </p>
    </div>

    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
